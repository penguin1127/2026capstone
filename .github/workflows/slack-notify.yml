name: Slack Notification

on:
  push:
    branches: [main, develop]
  pull_request:
    types: [opened, closed, reopened, review_requested]
  pull_request_review:
    types: [submitted]
  issues:
    types: [opened, closed]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: PR 생성 알림
        if: github.event_name == 'pull_request' && github.event.action == 'opened'
        uses: slackapi/slack-github-action@v1.26.0
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "🔀 새 PR이 생성됐어요!\n*${{ github.event.pull_request.title }}*\nby ${{ github.actor }}\n${{ github.event.pull_request.html_url }}"
            }

      - name: PR 머지 알림
        if: github.event_name == 'pull_request' && github.event.action == 'closed' && github.event.pull_request.merged == true
        uses: slackapi/slack-github-action@v1.26.0
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "✅ PR이 머지됐어요!\n*${{ github.event.pull_request.title }}*\nby ${{ github.actor }}\n${{ github.event.pull_request.html_url }}"
            }

      - name: PR 닫힘 알림
        if: github.event_name == 'pull_request' && github.event.action == 'closed' && github.event.pull_request.merged == false
        uses: slackapi/slack-github-action@v1.26.0
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "❌ PR이 닫혔어요\n*${{ github.event.pull_request.title }}*\nby ${{ github.actor }}\n${{ github.event.pull_request.html_url }}"
            }

      - name: Push 알림
        if: github.event_name == 'push'
        uses: slackapi/slack-github-action@v1.26.0
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "📦 새 커밋이 Push됐어요\n*브랜치:* ${{ github.ref_name }}\n*커밋:* ${{ github.event.head_commit.message }}\nby ${{ github.actor }}"
            }

      - name: 리뷰 요청 알림
        if: github.event_name == 'pull_request' && github.event.action == 'review_requested'
        uses: slackapi/slack-github-action@v1.26.0
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "👀 코드 리뷰 요청이 왔어요!\n*${{ github.event.pull_request.title }}*\nby ${{ github.actor }}\n${{ github.event.pull_request.html_url }}"
            }

      - name: CodeRabbit 리뷰 알림
        if: github.event_name == 'pull_request_review' && github.event.review.user.login == 'coderabbitai[bot]'
        uses: slackapi/slack-github-action@v1.26.0
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "🐰 CodeRabbit이 리뷰를 달았어요!\n*${{ github.event.pull_request.title }}*\n${{ github.event.pull_request.html_url }}"
            }

      - name: 이슈 생성 알림
        if: github.event_name == 'issues' && github.event.action == 'opened'
        uses: slackapi/slack-github-action@v1.26.0
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "🐛 새 이슈가 생성됐어요\n*${{ github.event.issue.title }}*\nby ${{ github.actor }}\n${{ github.event.issue.html_url }}"
            }

      - name: 이슈 닫힘 알림
        if: github.event_name == 'issues' && github.event.action == 'closed'
        uses: slackapi/slack-github-action@v1.26.0
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "✅ 이슈가 해결됐어요!\n*${{ github.event.issue.title }}*\nby ${{ github.actor }}\n${{ github.event.issue.html_url }}"
            }