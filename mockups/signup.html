<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>Sign Up | PixelHub</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Manrope:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            "background": "#0d1117", "surface": "#161b22",
            "surface-container-low": "#1c2128", "surface-container": "#21262d",
            "surface-container-high": "#292f38",
            "on-surface": "#e6edf3", "on-surface-variant": "#7d8590",
            "primary": "#2f81f7", "on-primary": "#ffffff",
            "accent": "#f0883e",
            "outline": "#30363d", "outline-variant": "#21262d",
            "error": "#f85149",
          },
          fontFamily: { "headline": ["Space Grotesk"], "body": ["Manrope"] },
          borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
        },
      },
    }
  </script>
  <style>
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
    .pixel-bg {
      background-color: #0f0e1a;
      background-image: radial-gradient(circle, #2f81f7 1px, transparent 1px);
      background-size: 28px 28px;
    }
    .strength-bar { height: 3px; border-radius: 9999px; transition: width 0.3s ease, background-color 0.3s ease; }
    .input-error { border-color: #f87171 !important; }
    .input-success { border-color: #34d399 !important; }
  </style>
</head>
<body class="bg-background font-body text-on-surface antialiased min-h-screen flex items-center justify-center relative overflow-x-hidden py-8">

  <div class="pixel-bg absolute inset-0 opacity-20 pointer-events-none"></div>
  <div class="absolute inset-0 bg-gradient-to-br from-primary/10 via-transparent to-background pointer-events-none"></div>

  <div class="relative z-10 w-full max-w-md mx-4">
    <div class="text-center mb-8">
      <a href="main.html" class="inline-flex items-center gap-2 text-3xl font-bold text-primary tracking-tighter font-headline hover:opacity-80 transition-opacity">
        <span class="material-symbols-outlined text-3xl">grid_view</span>PixelHub
      </a>
      <p class="text-on-surface-variant text-sm mt-2">픽셀 아트 크리에이터 커뮤니티</p>
    </div>

    <div class="bg-surface-container border border-outline-variant rounded-2xl p-8 shadow-2xl shadow-black/40">
      <h1 class="text-2xl font-bold font-headline tracking-tight mb-1">회원가입</h1>
      <p class="text-sm text-on-surface-variant mb-8">무료로 시작하세요. 언제든 취소 가능해요.</p>

      <form class="space-y-5" onsubmit="return false;">
        <!-- Username -->
        <div>
          <label class="block text-sm font-bold mb-1.5">사용자 이름 <span class="text-error">*</span></label>
          <div class="relative">
            <span class="material-symbols-outlined absolute left-3.5 top-1/2 -translate-y-1/2 text-on-surface-variant text-lg">alternate_email</span>
            <input id="usernameInput" type="text" placeholder="pixelartist_kim" oninput="validateUsername(this)"
              class="w-full pl-10 pr-10 py-3 bg-surface-container-low border border-outline-variant rounded-xl text-sm text-on-surface placeholder:text-on-surface-variant focus:ring-2 focus:ring-primary/40 focus:border-primary transition-all outline-none"/>
            <span id="usernameStatus" class="material-symbols-outlined absolute right-3.5 top-1/2 -translate-y-1/2 text-lg hidden"></span>
          </div>
          <p id="usernameMsg" class="text-xs text-on-surface-variant mt-1.5 px-1">영문 소문자, 숫자, 언더바(_) · 4~20자</p>
        </div>
        <!-- Email -->
        <div>
          <label class="block text-sm font-bold mb-1.5">이메일 <span class="text-error">*</span></label>
          <div class="relative">
            <span class="material-symbols-outlined absolute left-3.5 top-1/2 -translate-y-1/2 text-on-surface-variant text-lg">mail</span>
            <input id="emailInput" type="email" placeholder="example@pixelhub.io" oninput="validateEmail(this)"
              class="w-full pl-10 pr-10 py-3 bg-surface-container-low border border-outline-variant rounded-xl text-sm text-on-surface placeholder:text-on-surface-variant focus:ring-2 focus:ring-primary/40 focus:border-primary transition-all outline-none"/>
            <span id="emailStatus" class="material-symbols-outlined absolute right-3.5 top-1/2 -translate-y-1/2 text-lg hidden"></span>
          </div>
        </div>
        <!-- Password -->
        <div>
          <label class="block text-sm font-bold mb-1.5">비밀번호 <span class="text-error">*</span></label>
          <div class="relative">
            <span class="material-symbols-outlined absolute left-3.5 top-1/2 -translate-y-1/2 text-on-surface-variant text-lg">lock</span>
            <input id="passwordInput" type="password" placeholder="8자 이상 입력" oninput="checkPasswordStrength(this)"
              class="w-full pl-10 pr-12 py-3 bg-surface-container-low border border-outline-variant rounded-xl text-sm text-on-surface placeholder:text-on-surface-variant focus:ring-2 focus:ring-primary/40 focus:border-primary transition-all outline-none"/>
            <button type="button" onclick="togglePw('passwordInput','eyeIcon1')" class="absolute right-3.5 top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-on-surface transition-colors">
              <span id="eyeIcon1" class="material-symbols-outlined text-lg">visibility</span>
            </button>
          </div>
          <div class="mt-2 px-1">
            <div class="flex gap-1 mb-1">
              <div id="bar1" class="strength-bar flex-1 bg-outline-variant"></div>
              <div id="bar2" class="strength-bar flex-1 bg-outline-variant"></div>
              <div id="bar3" class="strength-bar flex-1 bg-outline-variant"></div>
              <div id="bar4" class="strength-bar flex-1 bg-outline-variant"></div>
            </div>
            <p id="strengthLabel" class="text-xs text-on-surface-variant">비밀번호를 입력하세요</p>
          </div>
        </div>
        <!-- Confirm Password -->
        <div>
          <label class="block text-sm font-bold mb-1.5">비밀번호 확인 <span class="text-error">*</span></label>
          <div class="relative">
            <span class="material-symbols-outlined absolute left-3.5 top-1/2 -translate-y-1/2 text-on-surface-variant text-lg">lock_reset</span>
            <input id="confirmInput" type="password" placeholder="비밀번호 재입력" oninput="checkConfirm(this)"
              class="w-full pl-10 pr-12 py-3 bg-surface-container-low border border-outline-variant rounded-xl text-sm text-on-surface placeholder:text-on-surface-variant focus:ring-2 focus:ring-primary/40 focus:border-primary transition-all outline-none"/>
            <button type="button" onclick="togglePw('confirmInput','eyeIcon2')" class="absolute right-3.5 top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-on-surface transition-colors">
              <span id="eyeIcon2" class="material-symbols-outlined text-lg">visibility</span>
            </button>
          </div>
          <p id="confirmMsg" class="text-xs text-on-surface-variant mt-1.5 px-1 hidden"></p>
        </div>
        <!-- Terms -->
        <div class="space-y-2.5 pt-1">
          <label class="flex items-center gap-3 cursor-pointer">
            <input type="checkbox" id="termsAll" onchange="toggleAll(this)" class="rounded accent-primary w-4 h-4"/>
            <span class="text-sm font-bold">전체 동의</span>
          </label>
          <div class="ml-7 space-y-2 border-t border-outline-variant pt-2.5">
            <label class="flex items-center gap-3 cursor-pointer">
              <input type="checkbox" class="term-check rounded accent-primary w-4 h-4" onchange="syncAll()"/>
              <span class="text-sm text-on-surface-variant flex-1"><span class="text-error font-bold mr-1">[필수]</span>서비스 이용약관 동의<a href="#" class="text-primary hover:underline ml-1 text-xs">보기</a></span>
            </label>
            <label class="flex items-center gap-3 cursor-pointer">
              <input type="checkbox" class="term-check rounded accent-primary w-4 h-4" onchange="syncAll()"/>
              <span class="text-sm text-on-surface-variant flex-1"><span class="text-error font-bold mr-1">[필수]</span>개인정보 수집 및 이용 동의<a href="#" class="text-primary hover:underline ml-1 text-xs">보기</a></span>
            </label>
            <label class="flex items-center gap-3 cursor-pointer">
              <input type="checkbox" class="term-check rounded accent-primary w-4 h-4" onchange="syncAll()"/>
              <span class="text-sm text-on-surface-variant flex-1"><span class="text-on-surface-variant font-bold mr-1">[선택]</span>마케팅 정보 수신 동의</span>
            </label>
          </div>
        </div>
        <button type="submit" class="w-full py-3.5 bg-primary text-white font-bold rounded-xl shadow-lg shadow-primary/25 hover:bg-primary/80 active:scale-[0.98] transition-all font-headline text-base mt-2">
          회원가입
        </button>
      </form>

      <p class="text-center text-sm text-on-surface-variant mt-6">
        이미 계정이 있으신가요?<a href="login.html" class="font-bold text-primary hover:underline ml-1">로그인</a>
      </p>
    </div>

    <p class="text-center mt-6">
      <a href="main.html" class="flex items-center justify-center gap-1 text-sm text-on-surface-variant hover:text-primary transition-colors">
        <span class="material-symbols-outlined text-base">arrow_back</span>메인으로 돌아가기
      </a>
    </p>
  </div>

  <script>
    function togglePw(inputId, iconId) {
      const input = document.getElementById(inputId);
      const icon = document.getElementById(iconId);
      input.type = input.type === 'password' ? 'text' : 'password';
      icon.textContent = input.type === 'password' ? 'visibility' : 'visibility_off';
    }
    function validateUsername(input) {
      const val = input.value;
      const status = document.getElementById('usernameStatus');
      const msg = document.getElementById('usernameMsg');
      const valid = /^[a-z0-9_]{4,20}$/.test(val);
      if (!val.length) { status.classList.add('hidden'); msg.textContent = '영문 소문자, 숫자, 언더바(_) · 4~20자'; msg.className = 'text-xs text-on-surface-variant mt-1.5 px-1'; return; }
      status.classList.remove('hidden');
      if (valid) { status.textContent = 'check_circle'; status.style.color = '#34d399'; input.className = input.className.replace('input-error','') + ' input-success'; msg.textContent = '사용 가능한 이름입니다.'; msg.className = 'text-xs text-emerald-400 mt-1.5 px-1'; }
      else { status.textContent = 'cancel'; status.style.color = '#f87171'; msg.textContent = '영문 소문자, 숫자, 언더바(_)만 · 4~20자'; msg.className = 'text-xs text-error mt-1.5 px-1'; }
    }
    function validateEmail(input) {
      const valid = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(input.value);
      const status = document.getElementById('emailStatus');
      if (!input.value.length) { status.classList.add('hidden'); return; }
      status.classList.remove('hidden');
      status.textContent = valid ? 'check_circle' : 'cancel';
      status.style.color = valid ? '#34d399' : '#f87171';
    }
    function checkPasswordStrength(input) {
      const val = input.value;
      const bars = [1,2,3,4].map(i => document.getElementById('bar'+i));
      const label = document.getElementById('strengthLabel');
      let score = 0;
      if (val.length >= 8) score++;
      if (/[A-Z]/.test(val)) score++;
      if (/[0-9]/.test(val)) score++;
      if (/[^A-Za-z0-9]/.test(val)) score++;
      const colors = ['#f87171','#f59e0b','#60a5fa','#34d399'];
      const labels = ['약함','보통','강함','매우 강함'];
      bars.forEach((bar,i) => { bar.style.backgroundColor = i < score ? colors[score-1] : '#272550'; });
      label.textContent = val.length ? '비밀번호 강도: ' + labels[score-1] : '비밀번호를 입력하세요';
      checkConfirm(document.getElementById('confirmInput'));
    }
    function checkConfirm(input) {
      const pw = document.getElementById('passwordInput').value;
      const msg = document.getElementById('confirmMsg');
      if (!input.value.length) { msg.classList.add('hidden'); return; }
      msg.classList.remove('hidden');
      if (input.value === pw) { msg.textContent = '✓ 비밀번호가 일치합니다.'; msg.className = 'text-xs text-emerald-400 mt-1.5 px-1'; }
      else { msg.textContent = '✕ 비밀번호가 일치하지 않습니다.'; msg.className = 'text-xs text-error mt-1.5 px-1'; }
    }
    function toggleAll(cb) { document.querySelectorAll('.term-check').forEach(c => c.checked = cb.checked); }
    function syncAll() { document.getElementById('termsAll').checked = [...document.querySelectorAll('.term-check')].every(c => c.checked); }
  </script>
</body>
</html>
