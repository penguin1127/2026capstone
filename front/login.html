<!DOCTYPE html>
<html class="light" lang="en">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>Login | PixelHub</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Manrope:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "on-primary": "#ffffff",
            "surface-container-lowest": "#ffffff",
            "surface-container-low": "#f2f4f6",
            "surface-container": "#eceef0",
            "surface-container-high": "#e6e8ea",
            "surface-bright": "#f7f9fb",
            "primary": "#6b38d4",
            "primary-fixed-dim": "#d0bcff",
            "on-surface": "#191c1e",
            "on-surface-variant": "#494454",
            "outline": "#7b7486",
            "outline-variant": "#cbc3d7",
            "surface": "#f7f9fb",
            "error": "#ba1a1a",
            "error-container": "#ffdad6",
          },
          fontFamily: {
            "headline": ["Space Grotesk"],
            "body": ["Manrope"],
          },
          borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
        },
      },
    }
  </script>
  <style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
    /* Pixel dot pattern background */
    .pixel-bg {
      background-color: #f7f9fb;
      background-image: radial-gradient(circle, #6b38d4 1px, transparent 1px);
      background-size: 28px 28px;
      opacity: 1;
    }
    .pixel-bg::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at center, rgba(247,249,251,0.3) 0%, rgba(247,249,251,0.97) 70%);
      pointer-events: none;
    }
  </style>
</head>
<body class="font-body text-on-surface antialiased min-h-screen flex items-center justify-center relative overflow-hidden">

  <!-- Background -->
  <div class="pixel-bg absolute inset-0 opacity-40"></div>
  <div class="absolute inset-0 bg-gradient-to-br from-primary/5 via-transparent to-surface-container pointer-events-none"></div>

  <!-- Card -->
  <div class="relative z-10 w-full max-w-md mx-4">

    <!-- Logo -->
    <div class="text-center mb-8">
      <a href="main.html" class="inline-flex items-center gap-2 text-3xl font-bold text-primary tracking-tighter font-headline hover:opacity-80 transition-opacity">
        <span class="material-symbols-outlined text-3xl">grid_view</span>
        PixelHub
      </a>
      <p class="text-on-surface-variant text-sm mt-2">픽셀 아트 크리에이터 커뮤니티</p>
    </div>

    <!-- Login Form Card -->
    <div class="bg-white rounded-2xl shadow-xl shadow-primary/10 border border-outline-variant/40 p-8">

      <h1 class="text-2xl font-bold font-headline tracking-tight text-on-surface mb-1">로그인</h1>
      <p class="text-sm text-on-surface-variant mb-8">계속하려면 로그인하세요.</p>

      <form class="space-y-5" onsubmit="return false;">

        <!-- Email -->
        <div>
          <label class="block text-sm font-bold text-on-surface mb-1.5">이메일</label>
          <div class="relative">
            <span class="material-symbols-outlined absolute left-3.5 top-1/2 -translate-y-1/2 text-on-surface-variant text-lg">mail</span>
            <input
              type="email"
              placeholder="example@pixelhub.io"
              class="w-full pl-10 pr-4 py-3 bg-surface-container-low border border-outline-variant rounded-xl text-sm focus:ring-2 focus:ring-primary/30 focus:border-primary focus:bg-white transition-all outline-none"
            />
          </div>
        </div>

        <!-- Password -->
        <div>
          <label class="block text-sm font-bold text-on-surface mb-1.5">비밀번호</label>
          <div class="relative">
            <span class="material-symbols-outlined absolute left-3.5 top-1/2 -translate-y-1/2 text-on-surface-variant text-lg">lock</span>
            <input
              id="passwordInput"
              type="password"
              placeholder="비밀번호 입력"
              class="w-full pl-10 pr-12 py-3 bg-surface-container-low border border-outline-variant rounded-xl text-sm focus:ring-2 focus:ring-primary/30 focus:border-primary focus:bg-white transition-all outline-none"
            />
            <button
              type="button"
              onclick="togglePassword()"
              class="absolute right-3.5 top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-on-surface transition-colors"
            >
              <span id="eyeIcon" class="material-symbols-outlined text-lg">visibility</span>
            </button>
          </div>
        </div>

        <!-- Remember me + Forgot -->
        <div class="flex items-center justify-between">
          <label class="flex items-center gap-2 cursor-pointer">
            <input type="checkbox" class="rounded border-outline-variant accent-primary w-4 h-4"/>
            <span class="text-sm text-on-surface-variant">로그인 상태 유지</span>
          </label>
          <a href="#" class="text-sm font-bold text-primary hover:underline">비밀번호 찾기</a>
        </div>

        <!-- Submit -->
        <button
          type="submit"
          class="w-full py-3.5 bg-primary text-white font-bold rounded-xl shadow-lg shadow-primary/25 hover:bg-primary/90 hover:shadow-primary/40 active:scale-[0.98] transition-all font-headline tracking-tight text-base"
        >
          로그인
        </button>

      </form>

      <!-- Divider -->
      <div class="flex items-center gap-4 my-6">
        <div class="flex-1 h-px bg-outline-variant"></div>
        <span class="text-xs text-on-surface-variant font-bold">또는</span>
        <div class="flex-1 h-px bg-outline-variant"></div>
      </div>

      <!-- OAuth (coming soon) -->
      <div class="space-y-3">
        <button
          disabled
          class="w-full flex items-center justify-center gap-3 py-3 bg-surface-container-low border border-outline-variant rounded-xl text-sm font-bold text-on-surface-variant cursor-not-allowed opacity-60"
        >
          <svg class="w-5 h-5" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
          Google로 계속하기
          <span class="ml-auto text-xs bg-surface-container px-2 py-0.5 rounded-full">준비 중</span>
        </button>
      </div>

      <!-- Sign up link -->
      <p class="text-center text-sm text-on-surface-variant mt-6">
        계정이 없으신가요?
        <a href="signup.html" class="font-bold text-primary hover:underline ml-1">회원가입</a>
      </p>

    </div>

    <!-- Back to main -->
    <p class="text-center mt-6">
      <a href="main.html" class="flex items-center justify-center gap-1 text-sm text-on-surface-variant hover:text-primary transition-colors">
        <span class="material-symbols-outlined text-base">arrow_back</span>
        메인으로 돌아가기
      </a>
    </p>

  </div>

  <script>
    function togglePassword() {
      const input = document.getElementById('passwordInput');
      const icon = document.getElementById('eyeIcon');
      if (input.type === 'password') {
        input.type = 'text';
        icon.textContent = 'visibility_off';
      } else {
        input.type = 'password';
        icon.textContent = 'visibility';
      }
    }
  </script>

</body>
</html>
